name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Inject version
        run: |
          sed -i "s/^readonly WALRUS_VERSION=.*/readonly WALRUS_VERSION=\"${{ steps.version.outputs.VERSION }}\"/" lib/constants.sh

      - name: Build tarball
        run: |
          ARCHIVE="walrus-${{ steps.version.outputs.VERSION }}.tar.gz"
          tar czf "$ARCHIVE" \
            --transform "s,^,walrus/," \
            walrus \
            lib/ \
            commands/ \
            install.sh \
            LICENSE \
            README.md
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Generate checksums
        run: |
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
